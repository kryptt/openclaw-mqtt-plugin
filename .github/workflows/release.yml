name: release

on:
  push:
    tags:
      # Semver tags without 'v' prefix: 0.1.0, 1.2.3, 0.1.0-rc.1
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

env:
  NODE_VERSION: "24.x"
  CLAWHUB_REGISTRY: "https://clawhub.ai"
  # Pinned to a reviewed ClawHub commit so release behavior stays reproducible.
  # Match the commit openclaw/openclaw uses for its plugin-clawhub-release flow.
  CLAWHUB_REPOSITORY: "openclaw/clawhub"
  CLAWHUB_REF: "4af2bd50a71465683dbf8aa269af764b9d39bdf5"

permissions:
  contents: read
  id-token: write     # ClawHub OIDC publish token

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: clawhub-plugin-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify tag matches package.json version
        id: meta
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -e 'console.log(require("./package.json").version)')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) != git tag ($TAG_VERSION)" >&2
            exit 1
          fi
          PKG_NAME=$(node -e 'console.log(require("./package.json").name)')
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Checkout ClawHub CLI source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CLAWHUB_REPOSITORY }}
          ref: ${{ env.CLAWHUB_REF }}
          path: clawhub-source
          fetch-depth: 1

      - name: Install ClawHub CLI dependencies
        working-directory: clawhub-source
        run: bun install --frozen-lockfile

      - name: Bootstrap ClawHub CLI
        run: |
          cat > "$RUNNER_TEMP/clawhub" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          exec bun "$GITHUB_WORKSPACE/clawhub-source/packages/clawhub/src/cli.ts" "\$@"
          EOF
          chmod +x "$RUNNER_TEMP/clawhub"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Ensure version is not already published
        env:
          PACKAGE_NAME: ${{ steps.meta.outputs.name }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          encoded_name="$(node -e 'console.log(encodeURIComponent(process.env.PACKAGE_NAME ?? ""))')"
          encoded_version="$(node -e 'console.log(encodeURIComponent(process.env.PACKAGE_VERSION ?? ""))')"
          url="${CLAWHUB_REGISTRY%/}/api/v1/packages/${encoded_name}/versions/${encoded_version}"
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "${url}")"
          if [[ "${status}" =~ ^2 ]]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on ClawHub." >&2
            exit 1
          fi
          if [[ "${status}" != "404" ]]; then
            echo "Unexpected ClawHub response (${status}) for ${PACKAGE_NAME}@${PACKAGE_VERSION}." >&2
            exit 1
          fi

      - name: Publish to ClawHub
        env:
          CLAWHUB_REGISTRY: ${{ env.CLAWHUB_REGISTRY }}
          CLAWHUB_WORKDIR: ${{ github.workspace }}
        run: |
          clawhub package publish . \
            --tags latest \
            --source-repo "${{ github.repository }}" \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ github.ref }}" \
            --source-path "."
