name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -e 'console.log(require("./package.json").version)')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) != git tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck || true

      - name: Test
        run: npm test

  publish:
    needs: verify
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@4af2bd50a71465683dbf8aa269af764b9d39bdf5
    with:
      dry_run: false
      json: true
      tags: latest
    permissions:
      contents: read
      id-token: write
